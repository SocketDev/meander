overrides:
  # Fleet-canonical overrides (managed by socket-wheelhouse sync; do not edit).
  '@socketregistry/packageurl-js': 'catalog:'
  '@socketsecurity/lib': 'catalog:'
  '@socketsecurity/registry': 'catalog:'
  '@socketsecurity/sdk': 'catalog:'
  # Dedup: @types/node 18 rides in via @anthropic-ai/sdk + @valtown/sdk and
  # drags undici-types 5 beside the 26/8 pair the tree already carries.
  # Types-only package — collapse to the catalog pin.
  '@types/node': 'catalog:'
  'chalk@>=5': '5.6.2'
  # Dedup: css-tree 2.2.1 via csso, pinned ~2.2.0, vs 3.2.1 direct from svgo.
  # css-tree 3's AST-shape breaks don't touch the surface csso exercises —
  # functionally verified at the wheelhouse: csso.minify() and a full
  # svgo.optimize() pass both produce correct output on 3.2.1.
  'css-tree': '3.2.1'
  'es-define-property': 'npm:@socketregistry/es-define-property@1.0.7'
  'es-set-tostringtag': 'npm:@socketregistry/es-set-tostringtag@1.0.10'
  'function-bind': 'npm:@socketregistry/function-bind@1.0.7'
  'glob': '13.0.6'
  'gopd': 'npm:@socketregistry/gopd@1.0.7'
  'has-symbols': 'npm:@socketregistry/has-symbols@1.0.7'
  'has-tostringtag': 'npm:@socketregistry/has-tostringtag@1.0.7'
  'hasown': 'npm:@socketregistry/hasown@1.0.7'
  'iconv-lite': '0.7.2'
  'isexe@>=3': '4.0.0'
  'lru-cache@>=10': '11.3.6'
  'magic-string': '1.0.0'
  'mime-db': '1.54.0'
  'mime-types@>=3': '3.0.2'
  'minipass@>=4': '7.1.3'
  'safe-buffer': 'npm:@socketregistry/safe-buffer@1.0.9'
  'safer-buffer': 'npm:@socketregistry/safer-buffer@1.0.10'
  'semver@>=5.0.0 <7.6.0': '7.8.1'
  'side-channel': 'npm:@socketregistry/side-channel@1.0.10'
  'ssri@>=12': '13.0.1'
  'string-width@>=5': '8.1.0'
  'update-notifier@>=4.0.0': '7.3.1'
  'uuid': '11.1.1'
  'which': '7.0.0'
  'wrap-ansi@>=8': '9.0.2'
  'yaml@2': '2.9.0'

# Register .claude/hooks/* as workspace packages so `pnpm install`
# resolves each hook's deps + taze (via `pnpm run update`) bumps
# them alongside the root manifest. Keeps hook deps in lockstep.
packages:
  - '.claude/hooks/fleet/*'
  - '.config/fleet/oxlint-plugin'
  - '.config/fleet/oxlint-plugin/fleet/*'
trustPolicy: no-downgrade
allowBuilds:
  # @swc/core ships a native binary + a WASM plugin cache used by the
  # vitiate coverage-guided fuzz lane's instrument transform (see the
  # root vitest.config.mts). Its postinstall must run so `pnpm run
  # test:fuzz` can SWC-instrument src/.
  '@socketsecurity/sdk': false
  '@swc/core': true
  # esbuild ships platform-specific binaries via a postinstall;
  # it's a devDep of meander and a peer dep consumers use for
  # the opt-in minify pass, so always let it run.
  cpu-features: false
  esbuild: true
  # puppeteer's postinstall downloads ~300MB of Chromium. meander
  # itself never renders mermaid in CI — the fixture has no
  # mermaid blocks — so skip the build script here. Consumers
  # who enable { "mermaid": true } install puppeteer as their
  # own peer dep and allow the build in their own
  # pnpm-workspace.yaml.
  protobufjs: false
  puppeteer: false
  ssh2: false
# Apply a 7-day cooldown on fresh releases (matches taze's
# maturityPeriod). Blocks install of any version published in
# the last 7 days; gives the ecosystem time to catch
# compromised uploads.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  # `@rolldown/pluginutils` versions independently of the catalog-pinned
  # rolldown release; the per-platform bindings share its pin.
  # Listed explicitly per the fleet "no scope globs in soak excludes" rule.
  - '@rolldown/pluginutils'
  - '@sdxgen/*'
  - '@socketoverride/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'
  - '@stuie/*'
  - '@ultrathink/*'
  - 'sdxgen'
  - 'sfw'
  - 'socket'
  - 'stuie'
  # published: 2026-07-16 | removable: 2026-07-23
  - 'magic-string@1.0.0'
  # oxlint-tsgolint 7.0.2001 — the type-aware lint sidecar the fleet lint
  # runner's whole-tree gate needs. The main package + its per-platform binary
  # family are pinned to the exact version (a scope glob would blanket-bypass a
  # future publish); exact-pinned so a future version re-soaks.
  # published: 2026-07-21 | removable: 2026-07-28
  - 'oxlint-tsgolint@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/darwin-arm64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/darwin-x64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/linux-arm64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/linux-x64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/win32-arm64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/win32-x64@7.0.2001'
  # published: 2026-07-16 | removable: 2026-07-23
  - 'portless@0.15.4'
  # Dependabot security bump: 0.23.1 ships js-yaml 5.2.1 (patches a
  # moderate advisory in the 5.2.0 it pinned).
  # published: 2026-07-17 | removable: 2026-07-24
  - 'markdownlint-cli2@0.23.1'
blockExoticSubdeps: true
confirmModulesPurge: false
managePackageManagerVersions: false
pmOnFail: warn
